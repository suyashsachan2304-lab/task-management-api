version: "3.9"

services:

  task-management:

    build:
      context: .
      dockerfile: Dockerfile

    image: task-management:latest

    container_name: task-management

    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: default
      JAVA_OPTS: "-Xms256m -Xmx512m"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - task-network
    
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - task-network

networks:
  task-network:
    driver: bridge